# docker-compose.yml - everything needed to develop and smoke-test icl-authentication-lib
# locally: Keycloak (the IdP), Postgres (audit/session/lockout tables + Keycloak's own
# storage), and the auth server itself built from this repo.
#
#   docker compose up -d postgres keycloak      # infra only, run ./gradlew :server:run locally
#   docker compose up -d --build                # everything, including the built server
#
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-icl_auth}
      POSTGRES_USER: ${DB_USERNAME:-icl_service}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - icl_auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-icl_service}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      ACCESS_TOKEN_LIFESPAN_SECONDS: ${KEYCLOAK_ACCESS_TOKEN_LIFESPAN_SECONDS:-300}
      REFRESH_TOKEN_LIFESPAN_SECONDS: ${KEYCLOAK_REFRESH_TOKEN_LIFESPAN_SECONDS:-1800}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./realm-export:/opt/keycloak/data/import
    # icl-realm.json is generated from icl-realm.json.template on every start, substituting
    # the token lifespans above - this is the "expires_in"/"refresh_expires_in" duration in
    # /auth/login and /auth/refresh responses, controlled via .env instead of being baked in.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed -e "s/__ACCESS_TOKEN_LIFESPAN_SECONDS__/$$ACCESS_TOKEN_LIFESPAN_SECONDS/" \
            -e "s/__REFRESH_TOKEN_LIFESPAN_SECONDS__/$$REFRESH_TOKEN_LIFESPAN_SECONDS/" \
            /opt/keycloak/data/import/icl-realm.json.template > /opt/keycloak/data/import/icl-realm.json
        exec /opt/keycloak/bin/kc.sh start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy

  auth-server:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  icl_auth_postgres_data:
